<!DOCTYPE html>
<!-- Dokumen HTML5 diawali dengan deklarasi doctype di bawah ini untuk memberi tahu browser bahwa ini adalah dokumen HTML5 modern -->
<html lang="id">
<head>
    <!-- Tag meta charset menentukan pengodean karakter (UTF-8 mendukung hampir semua karakter/simbol di dunia) -->
    <meta charset="UTF-8">
    
    <!-- Tag viewport sangat penting untuk Responsive Design agar skala halaman menyesuaikan ukuran layar perangkat (mobile/desktop) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Bio Link saya | Portal Portofolio & Sosial Media</title>
    
    <!-- Google Fonts: Mengimpor font Outfit & Plus Jakarta Sans agar tampilan teks terlihat modern dan premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome: Digunakan untuk memanggil ikon-ikon sosial media/tombol secara mudah -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS Internal untuk memberikan style/tampilan pada halaman bio link ini -->
    <style>
        /* :root digunakan untuk mendefinisikan CSS Variables (variabel warna) agar mudah dikelola dan konsisten */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); /* Warna latar gradasi gelap yang elegan */
            --card-bg: rgba(255, 255, 255, 0.05); /* Latar belakang transparan (efek glassmorphism) */
            --card-border: rgba(255, 255, 255, 0.1); /* Garis batas tipis transparan */
            --text-primary: #f8fafc; /* Warna teks utama (putih terang) */
            --text-secondary: #94a3b8; /* Warna teks sekunder (abu-abu terang) */
            --accent-color: #818cf8; /* Warna aksen/sorotan (indigo terang) */
            --accent-hover: #a5b4fc; /* Warna aksen ketika kursor diarahkan (hover) */
            --shadow-custom: 0 8px 32px 0 rgba(0, 0, 0, 0.3); /* Efek bayangan bayangan lembut */
        }

        /* Resetting CSS: Menghilangkan margin dan padding bawaan browser agar layout konsisten */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Membuat ukuran padding dan border masuk ke dalam kalkulasi lebar elemen */
        }

        /* Mengatur style dasar body (tampilan utama halaman) */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh; /* Memastikan tinggi body minimal memenuhi layar penuh */
            display: flex;
            flex-direction: column; /* Menyusun konten dari atas ke bawah secara vertikal */
            align-items: center; /* Memosisikan konten di tengah secara horizontal */
            justify-content: center; /* Memosisikan konten di tengah secara vertikal */
            padding: 2.5rem 1.5rem;
            overflow-x: hidden; /* Mencegah munculnya scrollbar horizontal */
        }

        /* Container utama pembungkus kartu bio link */
        .container {
            width: 100%;
            max-width: 480px; /* Lebar maksimal kartu agar pas di layar mobile maupun desktop */
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px; /* Membuat sudut kartu melengkung halus */
            padding: 3rem 2rem;
            backdrop-filter: blur(16px); /* Efek blur kaca di belakang kartu (Glassmorphism) */
            -webkit-backdrop-filter: blur(16px); /* Dukungan untuk browser Safari/Apple */
            box-shadow: var(--shadow-custom);
            text-align: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        /* Efek interaktif ketika kartu disorot kursor */
        .container:hover {
            border-color: rgba(129, 140, 248, 0.3);
            transform: translateY(-2px); /* Kartu sedikit terangkat ke atas */
        }

        /* --- Bagian Header: Foto Profil, Nama, & Bio --- */
        header {
            margin-bottom: 2.5rem;
        }

        /* Pembungkus foto profil agar berbentuk lingkaran dengan efek cahaya di sekelilingnya */
        .profile-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 1.5rem auto;
            transition: 1s;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%; /* Membuat gambar menjadi lingkaran sempurna */
            object-fit: cover; /* Memastikan gambar tetap proporsional dan tidak lonjong */
            border: 3px solid var(--accent-color); /* Garis tepi berwarna aksen */
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.4); /* Efek cahaya di sekitar foto profil */
        }

        .profile-wrapper:hover{
            scale: 1.2;
            transition: 1s;
        }

        /* Animasi sinyal berdenyut kecil di belakang foto profil */
        .profile-wrapper::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 1px solid var(--accent-color);
            opacity: 0.5;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        /* Gaya judul nama (H1) */
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; /* Membuat warna teks bergradasi */
        }

        /* Gaya bio singkat */
        .bio {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 400;
        }

        /* --- Bagian Utama/Main: Daftar Link --- */
        main {
            width: 100%;
        }

        .links-list {
            list-style: none; /* Menghilangkan titik bullet default bawaan tag <ul> / <li> */
            display: flex;
            flex-direction: column;
            gap: 1rem; /* Jarak antar tombol link sebesar 1rem (16px) */
        }

        /* Gaya tautan (tombol link) */
        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            color: var(--text-primary);
            text-decoration: none; /* Menghilangkan garis bawah tautan bawaan tag <a> */
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Elemen pembungkus ikon dan teks di dalam tombol link */
        .link-content {
            display: flex;
            align-items: center;
            gap: 1rem; /* Jarak antara ikon dan tulisan */
        }

        .link-content i {
            font-size: 1.25rem;
            color: var(--accent-color);
            transition: color 0.25s ease;
        }

        /* Ikon panah kecil di sebelah kanan tombol */
        .arrow-icon {
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.6;
            transition: all 0.25s ease;
        }

        /* Efek hover pada tombol link saat kursor diarahkan */
        .link-item:hover {
            background: rgba(129, 140, 248, 0.1); /* Latar belakang menjadi sedikit terang kebiruan */
            border-color: var(--accent-color); /* Warna border berubah menjadi warna aksen */
            transform: scale(1.02); /* Tombol sedikit membesar secara dinamis */
            box-shadow: 0 4px 15px rgba(129, 140, 248, 0.15); /* Memberikan bayangan halus di bawah tombol */
        }

        .link-item:hover .link-content i {
            color: var(--accent-hover); /* Ikon berubah warna saat tombol disorot */
        }

        .link-item:hover .arrow-icon {
            opacity: 1;
            transform: translateX(4px); /* Panah bergerak sedikit ke kanan */
            color: var(--accent-color);
        }

        /* --- Bagian Footer --- */
        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.7;
            
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* --- Responsive Design (Kustomisasi untuk Layar Sangat Kecil / Mobile) --- */
        @media (max-width: 480px) {
            body {
                padding: 1.5rem 1rem;
            }
            .container {
                padding: 2.5rem 1.25rem;
                border-radius: 20px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .link-item {
                padding: 0.9rem 1.25rem;
            }
        }
    </style>
</head>
<body>

    <!-- TAG SEMANTIC: <div class="container"> digunakan sebagai wrapper utama halaman -->
    <div class="container">

        <!-- TAG SEMANTIC: <header> membungkus bagian atas halaman seperti foto profil, nama, dan bio -->
        <header>
            <div class="profile-wrapper">
                <!-- Foto profil yang telah di-generate sebelumnya dan disalin ke folder projek -->
                <img src="people-image.png" alt="Foto Profil" class="profile-img">
            </div>
            
            <!-- H1 digunakan untuk judul utama/nama pemilik bio link -->
            <h1>Bastian Abi Manyu</h1>
            
            <!-- Paragraf (<p>) untuk menulis deskripsi singkat atau keahlian -->
            <p class="bio">Web Developer Enthusiast & UI/UX Designer. Senang mempelajari hal baru di dunia pengembangan web.</p>
        </header>

        <!-- TAG SEMANTIC: <main> merepresentasikan konten utama di halaman ini, yaitu daftar tombol link -->
        <main>
            <!-- Tag <ul> (Unordered List) untuk membuat list daftar link yang tidak berurutan -->
            <ul class="links-list">
                
                <!-- Tag <li> (List Item) merepresentasikan setiap baris item di dalam list -->
                <li>
                    <!-- Tag <a> (Anchor) digunakan untuk membuat link ke halaman eksternal (portofolio) -->
                    <!-- target="_blank" digunakan agar link terbuka di tab baru browser -->
                    <!-- rel="noopener" direkomendasikan untuk keamanan saat membuka tab baru -->
                    <a href="https://github.com" target="_blank" rel="noopener" class="link-item">
                        <div class="link-content">
                            <!-- Tag <i> dari FontAwesome untuk merender ikon folder portofolio -->
                            <i class="fa-solid fa-briefcase"></i>
                            <span>Portofolio Saya</span>
                        </div>
                        <i class="fa-solid fa-chevron-right arrow-icon"></i>
                    </a>
                </li>

                <li>
                    <a href="https://github.com" target="_blank" rel="noopener" class="link-item">
                        <div class="link-content">
                            <!-- Ikon GitHub -->
                            <i class="fa-brands fa-github"></i>
                            <span>GitHub Profil</span>
                        </div>
                        <i class="fa-solid fa-chevron-right arrow-icon"></i>
                    </a>
                </li>

                <li>
                    <a href="https://linkedin.com" target="_blank" rel="noopener" class="link-item">
                        <div class="link-content">
                            <!-- Ikon LinkedIn -->
                            <i class="fa-brands fa-linkedin"></i>
                            <span>Hubungkan di LinkedIn</span>
                        </div>
                        <i class="fa-solid fa-chevron-right arrow-icon"></i>
                    </a>
                </li>

                <li>
                    <a href="https://instagram.com" target="_blank" rel="noopener" class="link-item">
                        <div class="link-content">
                            <!-- Ikon Instagram -->
                            <i class="fa-brands fa-instagram"></i>
                            <span>Ikuti di Instagram</span>
                        </div>
                        <i class="fa-solid fa-chevron-right arrow-icon"></i>
                    </a>
                </li>

            </ul>
        </main>

        <!-- TAG SEMANTIC: <footer> digunakan untuk informasi hak cipta atau catatan kaki di bagian paling bawah -->
        <footer>
            <p>Dibuat dengan <i class="fa-solid fa-heart" style="color: #ec4899; margin: 0 2px;"></i> untuk belajar HTML & CSS.</p>
        </footer>

    </div>

</body>
</html>
